<!DOCTYPE HTML>
<html lang="ja">
<head>
<meta charset="UTF-8" />
  <title>J-12 課題</title>
</head>
<body>
  <p>J-12 課題</p>

  <ul class="list-group">
    <li class="list-group-item">100</li>
    <li class="list-group-item">110</li>
    <li class="list-group-item">120</li>
    <li class="list-group-item">130</li>
    <li class="list-group-item">140</li>
  </ul>

    <button id="changeBtn">変更</button>
    <button id="resetBtn">リセット</button>
  
  <script>
    let listGroupItems = document.querySelectorAll(".list-group-item");
    
    const initialValues = [];
    listGroupItems.forEach(function(li) {
        initialValues.push(parseInt(li.textContent));
    })

    document.getElementById("changeBtn").addEventListener("click", function() {
        for (let i = 0; i < listGroupItems.length; i++) {
            const value = parseInt(listGroupItems[i].textContent);
            listGroupItems[i].textContent = value * 10;
        }
    })

    document.getElementById("resetBtn").addEventListener("click", function() {
        listGroupItems.forEach(function(item, index) {
            item.textContent = initialValues[index];
        });
    })
  </script>
</body>
</html>
